<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <main class="container">
            <h1 id="pageTitle">Create New Account</h1>

            <div class="form-card" id="mainCard">
                <div class="stepper">
                    <div class="step active"><span class="step-num">1</span> Your Profile</div>
                    <div class="step"><span class="step-num">2</span> Business Info</div>
                    <div class="step"><span class="step-num">3</span> Finalize</div>
                </div>

                <div class="form-body" id="formContainer">
                    <p class="step-indicator">Step 1</p>
                    <h2>Your Profile</h2>
                    <p class="subtitle">Please fill in your details accurately to create your account.</p>

                    <form id="registrationForm" novalidate>
                        <div class="form-grid">
                            <div class="input-group">
                                <label>First Name*</label>
                                <input type="text" id="firstName" placeholder="e.g. John" autocomplete="off">
                                <span class="error-msg" id="firstNameError"></span>
                            </div>
                            <div class="input-group">
                                <label>Last Name*</label>
                                <input type="text" id="lastName" placeholder="e.g. Doe" autocomplete="off">
                                <span class="error-msg" id="lastNameError"></span>
                            </div>
                            <div class="input-group">
                                <label>Email Address*</label>
                                <input type="email" id="email" placeholder="email@example.com">
                                <span class="error-msg" id="emailError"></span>
                            </div>
                            <div class="input-group">
                                <label>Phone Number*</label>
                                <input type="text" id="phone" placeholder="Numbers only">
                                <span class="error-msg" id="phoneError"></span>
                            </div>
                            <div class="input-group">
                                <label>Password* (min 6 chars)</label>
                                <input type="password" id="password" placeholder="••••••••">
                                <span class="error-msg" id="passwordError"></span>
                            </div>
                            <div class="input-group">
                                <label>Confirm Password*</label>
                                <input type="password" id="confirmPassword" placeholder="••••••••">
                                <span class="error-msg" id="confirmPasswordError"></span>
                            </div>
                        </div>
                        
                        <div class="form-footer">
                            <a href="#" class="back-link">&lt; Back to Login</a>
                            <button type="submit" class="submit-btn">Submit Registration</button>
                        </div>
                    </form>
                </div>

                <div class="success-state" id="successState" style="display: none;">
                    <div class="success-icon">✓</div>
                    <h2>Submission Successful!</h2>
                    <p>Your account details have been recorded. Check the console for the data payload.</p>
                    <button class="submit-btn" onclick="location.reload()">Create Another Account</button>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
